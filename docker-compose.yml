version: '3.9'
services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - appnet

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    networks:
      - appnet
    depends_on:
      - backend

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: rootroot
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - appnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6
    command: ["redis-server", "--requirepass", "rootroot"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - appnet

  mongo:
    image: mongo:8
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: rootroot
      MONGO_INITDB_DATABASE: test
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mongo_data:
